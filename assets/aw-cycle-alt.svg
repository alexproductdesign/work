<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1200" height="520" fill="#F7F5F0"/>

  <!-- ============ BEFORE ============ -->
  <text x="70" y="96" font-size="13" letter-spacing="2.5" fill="#8a8a90" font-weight="500">BEFORE · UP TO 2 WEEKS</text>

  <g font-size="15" fill="#101012">
    <!-- solid steps -->
    <rect x="70" y="120" width="120" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="130" y="153" text-anchor="middle">Idea</text>

    <rect x="230" y="120" width="140" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="300" y="153" text-anchor="middle">Design spec</text>

    <!-- bottleneck: dev queue / waiting -->
    <rect x="410" y="120" width="210" height="56" rx="28" fill="#fff" stroke="#c9c5ba" stroke-width="1.4" stroke-dasharray="3 5"/>
    <text x="533" y="153" text-anchor="middle" fill="#8a8a90">Wait for a dev sprint</text>
    <g stroke="#8a8a90" stroke-width="1.6" fill="none" stroke-linecap="round">
      <circle cx="446" cy="148" r="10"/>
      <path d="M446 143v5l3 2"/>
    </g>

    <rect x="660" y="120" width="120" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="720" y="153" text-anchor="middle">Build</text>

    <rect x="820" y="120" width="100" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="870" y="153" text-anchor="middle">QA</text>

    <rect x="960" y="120" width="130" height="56" rx="28" fill="#101012"/>
    <text x="1025" y="153" text-anchor="middle" fill="#fff">Go live</text>
  </g>
  <!-- arrows -->
  <g stroke="#b9b6ae" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 148h28m0 0-6-5m6 5-6 5"/>
    <path d="M376 148h28m0 0-6-5m6 5-6 5"/>
    <path d="M626 148h28m0 0-6-5m6 5-6 5"/>
    <path d="M786 148h28m0 0-6-5m6 5-6 5"/>
    <path d="M926 148h28m0 0-6-5m6 5-6 5"/>
  </g>

  <!-- ============ AFTER ============ -->
  <text x="70" y="300" font-size="13" letter-spacing="2.5" fill="#8a8a90" font-weight="500">AFTER · 2 DAYS</text>

  <g font-size="15" fill="#101012">
    <rect x="70" y="324" width="120" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="130" y="357" text-anchor="middle">Idea</text>

    <rect x="230" y="324" width="230" height="56" rx="28" fill="#E1FF53"/>
    <text x="345" y="357" text-anchor="middle">Build in Figma Make</text>

    <rect x="500" y="324" width="150" height="56" rx="28" fill="#fff" stroke="#dcd8cf" stroke-width="1.4"/>
    <text x="575" y="357" text-anchor="middle">Designer QA</text>

    <rect x="690" y="324" width="130" height="56" rx="28" fill="#101012"/>
    <text x="755" y="357" text-anchor="middle" fill="#fff">Go live</text>
  </g>
  <g stroke="#b9b6ae" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 352h28m0 0-6-5m6 5-6 5"/>
    <path d="M466 352h28m0 0-6-5m6 5-6 5"/>
    <path d="M656 352h28m0 0-6-5m6 5-6 5"/>
  </g>

  <text x="70" y="452" font-size="15" fill="#6b6b70">No dev backlog, no handoff queue — the people with the ideas build the test themselves.</text>
</svg>
