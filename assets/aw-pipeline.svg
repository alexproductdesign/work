  <text x="600" y="296" text-anchor="middle" font-size="12" letter-spacing="2.5" fill="#8a8a90" font-weight="500">BRAND COMPLIANCE</text>

  <text x="600" y="500" text-anchor="middle" font-size="15" fill="#101012">Ship at eighty. Learn. Refine the winners to one hundred.</text>
